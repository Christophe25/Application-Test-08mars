name: Mise à jour quotidienne des vidéos

on:
  schedule:
    - cron: '0 6 * * *'   # 6h UTC = 7h Paris
  workflow_dispatch:        # Déclenchement manuel

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lancement du script de mise à jour
        run: node scripts/update-videos.cjs

      - name: Commit et push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add src/data.js
          if git diff --staged --quiet; then
            echo "Aucun changement"
          else
            git commit -m "🤖 Mise à jour automatique des vidéos $(date +'%Y-%m-%d') [skip ci]"
            git push
          fi

