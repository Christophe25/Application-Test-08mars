name: Mise à jour quotidienne des vidéos

on:
  schedule:
    - cron: '0 6 * * *'   # 6h UTC = 7h Paris (hiver) / 8h (été)
  workflow_dispatch:        # Déclenchement manuel depuis GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation des dépendances
        run: npm ci

      - name: Lancement du script de mise à jour
        run: node scripts/update-videos.cjs

      - name: Commit et push si des changements existent
        run: |
          git config user.email "christophef7@yahoo.fr"
          git config user.name "Christophe25"
          git add src/data.js
          git diff --staged --quiet || (git commit -m "🤖 Mise à jour automatique des vidéos $(date +'%Y-%m-%d')" && git push)
